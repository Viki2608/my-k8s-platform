apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway
  namespace: argocd # ArgoCD applications must exist in the argocd namespace
spec:
  project: default
  source:
    # Envoy Gateway is hosted on Docker Hub's OCI registry
    repoURL: registry-1.docker.io/envoyproxy
    chart: gateway-helm
    targetRevision: 1.7.2 # Replace with your preferred stable release version
  destination:
    server: https://kubernetes.default.svc
    namespace: envoy # Deploys into your requested namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true # Automatically creates the 'envoy' namespace
      - ServerSideApply=true